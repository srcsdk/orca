image: python:3.11

stages:
  - lint
  - test

cache:
  paths:
    - .cache/pip

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

lint:
  stage: lint
  script:
    - pip install flake8
    - flake8 --max-line-length=120 --ignore=E127,E128,E131,W503,W504,E226 .

compile:
  stage: test
  script:
    - pip install -r requirements.txt
    - find . -name "*.py" -not -path "./.cache/*" -exec python -m py_compile {} \;
    - python discovery.py --help

smoke:
  stage: test
  script:
    - pip install -r requirements.txt
    - python tests/smoke.py
